<body><h1>家庭投資總覽：隱私權說明</h1>
<p>本網站是私人家庭工具。網站透過 Google OAuth 取得唯讀存取權，僅讀取使用者本身已有權限的指定 Google Sheet。</p>
<ul><li>不會修改 Google Sheet。</li><li>不會將 OAuth access token 或資產資料寫入 localStorage。</li>
<li>登入憑證只保存在目前瀏覽器分頁的記憶體中。</li><li>關閉或重新整理頁面後，需要重新登入。</li></ul>
<p>網站原始碼可能公開託管於 GitHub Pages，但未登入且沒有 Google Sheet 權限的人無法取得試算表內容。</p>
